---
# config 全体（application.yaml 等）用スキーマ。Ginseng::Config#errors（rake config:lint）が使用する。
# 個々のソース定義のスキーマは source.yaml を正本とし、SourceValidator /
# `shrieker source validate` で検証する。
# （json-schema gem は YAML ファイルへの $ref を解決できないため、ここでは source.yaml を
#  参照せず、ソース定義の重複も持たない。config/sources/* は merged_raw に含まれないため
#  本スキーマでの sources 検証は実質発火しない。）
$schema: http://json-schema.org/draft-06/schema#
title: Local config
type: object
properties:
  crypt:
    type: object
    properties:
      password:
        type: string
    required:
      - password
  disable:
    type: boolean
  environment:
    enum:
      - development
      - production
  monitor:
    type: object
    properties:
      enabled:
        type: boolean
      bind:
        type: string
      port:
        type: integer
        minimum: 1
        maximum: 65535
      default_tolerance_seconds:
        type: integer
        minimum: 1
      retention_days:
        type: integer
        minimum: 1
  feed:
    type: object
    properties:
      default_tags:
        type: array
        items:
          type: string
  slack:
    type: object
    required:
      - hooks
    properties:
      hooks:
        type: array
        items:
          type: string
          format: uri
  sources:
    type: array
    items:
      type: object
